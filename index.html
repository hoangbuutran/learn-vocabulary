<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ứng dụng học từ vựng tiếng Anh - Flashcard, Trắc nghiệm, Spaced Repetition">
  <title>Học Từ Vựng Tiếng Anh</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="VocabLearn">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/flashcard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Header with Navigation -->
  <header class="app-header">
    <a href="#dashboard" class="header-brand" aria-label="Học Từ Vựng - Trang chủ">
      <img src="assets/icons/icon-192.png" alt="" class="brand-logo" aria-hidden="true" />
      <span class="brand-name">VocabLearn</span>
    </a>
    <nav class="app-nav" aria-label="Điều hướng chính">
      <ul class="nav-list">
        <li class="nav-item">
          <a href="#dashboard" class="nav-link active" data-view="dashboard">
            <span class="nav-icon" aria-hidden="true">🏠</span>
            <span class="nav-label">Trang chủ</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#flashcard" class="nav-link" data-view="flashcard">
            <span class="nav-icon" aria-hidden="true">🃏</span>
            <span class="nav-label">Flashcard</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#quiz" class="nav-link" data-view="quiz">
            <span class="nav-icon" aria-hidden="true">✍️</span>
            <span class="nav-label">Trắc nghiệm</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#match" class="nav-link" data-view="match">
            <span class="nav-icon" aria-hidden="true">🔗</span>
            <span class="nav-label">Nối từ</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#ipa" class="nav-link" data-view="ipa">
            <span class="nav-icon" aria-hidden="true">🗣️</span>
            <span class="nav-label">Phát âm</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#shadowing" class="nav-link" data-view="shadowing">
            <span class="nav-icon" aria-hidden="true">📺</span>
            <span class="nav-label">Nói theo</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#review" class="nav-link" data-view="review">
            <span class="nav-icon" aria-hidden="true">🔄</span>
            <span class="nav-label">Ôn tập</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#import" class="nav-link" data-view="import">
            <span class="nav-icon" aria-hidden="true">📥</span>
            <span class="nav-label">Nhập/Xuất</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#settings" class="nav-link" data-view="settings">
            <span class="nav-icon" aria-hidden="true">⚙️</span>
            <span class="nav-label">Cài đặt</span>
          </a>
        </li>
      </ul>
    </nav>
    <button class="nav-toggle" aria-label="Mở menu" aria-expanded="false">
      <span class="nav-toggle-icon">☰</span>
    </button>
  </header>

  <!-- Main Content Container -->
  <main id="app-content" class="app-content">
    <!-- Views will be rendered here dynamically -->
  </main>

  <!-- Toast/Notification Container -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true">
  </div>

  <!-- App Entry Point (ES Module) -->
  <script type="module" src="js/app.js"></script>

  <!-- PWA: register service worker for offline support & install-to-home-screen -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
